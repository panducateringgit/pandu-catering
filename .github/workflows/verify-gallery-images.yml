name: Verify site media URLs

# Runs after each deploy (push to main), on pull requests (so broken image
# URLs are caught before merging), on successful deployment_status events,
# on a daily schedule, and on demand. Fetches every referenced media URL
# (gallery_media, menu_items images, site_settings hero/logo/favicon) and
# asserts each resolves with HTTP 200.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  deployment_status:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify:
    # Only run for successful deployments when triggered by deployment_status
    if: ${{ github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify referenced media URLs resolve
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://fobhqgbqrlmstcbkvynh.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://www.panducatering.in' }}
          TIMEOUT_MS: "10000"
          RETRIES: "2"
        run: node scripts/verify-gallery-images.mjs
