name: Verify gallery image URLs

# Runs after each deploy (push to main), on a daily schedule, and on demand.
# Fetches every published gallery_media URL from the database and asserts each
# one resolves with HTTP 200. Fails the workflow (and surfaces a red check on
# the commit / PR) if any image is broken.

on:
  push:
    branches: [main]
  deployment_status:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify:
    # Only run for successful deployments when triggered by deployment_status
    if: ${{ github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify published gallery URLs resolve
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://fobhqgbqrlmstcbkvynh.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://pandu-catering.lovable.app' }}
        run: node scripts/verify-gallery-images.mjs
